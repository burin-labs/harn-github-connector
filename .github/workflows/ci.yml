name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  harn:
    name: Harn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read Harn version
        id: harn-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .harn-version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache harn-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo-harn/${{ steps.harn-version.outputs.version }}
          key: harn-cli-${{ runner.os }}-${{ steps.harn-version.outputs.version }}-${{ hashFiles('.harn-version') }}
          restore-keys: |
            harn-cli-${{ runner.os }}-${{ steps.harn-version.outputs.version }}-

      - name: Install harn-cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash .github/scripts/install-harn.sh "${{ steps.harn-version.outputs.version }}"

      - name: Show Harn version
        run: harn --version

      - name: Check
        run: harn check src

      - name: Lint
        run: harn lint src

      - name: Format
        run: harn fmt --check src tests

      - name: Run smoke tests
        shell: bash
        run: |
          set -euo pipefail
          for test in tests/*.harn; do
            harn run "${test}"
          done

      - name: Connector contract
        run: harn connector check . --provider github

      - name: Package install smoke
        shell: bash
        run: |
          set -euo pipefail
          smoke_root="$(mktemp -d)"
          trap 'rm -rf "$smoke_root"' EXIT
          cat > "$smoke_root/harn.toml" <<'EOF'
          [package]
          name = "harn-github-connector-consumer-smoke"
          version = "0.0.0"
          EOF
          cd "$smoke_root"
          harn add "$GITHUB_WORKSPACE@HEAD"
          printf 'import "harn-github-connector/default"\n' > smoke.harn
          harn check smoke.harn
