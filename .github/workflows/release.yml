name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to verify and publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify-and-publish:
    name: Verify and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${INPUT_TAG:-$REF_NAME}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Expected tag like v0.1.0, got '$tag'" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release.outputs.tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read Harn version
        id: harn-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .harn-version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Cache harn-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo-harn/${{ steps.harn-version.outputs.version }}
          key: harn-cli-${{ runner.os }}-${{ steps.harn-version.outputs.version }}-${{ hashFiles('.harn-version') }}
          restore-keys: |
            harn-cli-${{ runner.os }}-${{ steps.harn-version.outputs.version }}-

      - name: Install harn-cli
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash .github/scripts/install-harn.sh "${{ steps.harn-version.outputs.version }}"

      - name: Verify release
        env:
          CHECK_RELEASE_REQUIRE_TAG_HEAD: "true"
        run: scripts/check-release.sh "${{ steps.release.outputs.tag }}"

      - name: Extract changelog notes
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'PY' > release-notes.md
          from pathlib import Path
          import os
          import re
          import sys

          version = os.environ["VERSION"]
          source = Path("CHANGELOG.md").read_text(encoding="utf-8")
          pattern = re.compile(
              rf"^##\s+\[?{re.escape(version)}\]?(?:\s+-[^\n]*)?\n(?P<body>.*?)(?=^##\s+|\Z)",
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(source)
          if not match:
              print(f"CHANGELOG.md does not contain notes for {version}", file=sys.stderr)
              sys.exit(1)
          body = match.group("body").strip()
          if not body:
              print(f"CHANGELOG.md notes for {version} are empty", file=sys.stderr)
              sys.exit(1)
          print(body)
          PY

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "harn-github-connector $TAG" \
              --notes-file release-notes.md \
              --draft=false \
              --prerelease=false
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "harn-github-connector $TAG" \
              --notes-file release-notes.md \
              --verify-tag
          fi
