[package]
name = "harn-github-connector"
version = "0.4.0"
description = "Pure-Harn GitHub App connector: webhooks, installation token rotation, REST/GraphQL dispatch."
license = "MIT OR Apache-2.0"
repository = "https://github.com/burin-labs/harn-github-connector"
harn = ">=0.8,<0.9"

[exports]
default = "src/lib.harn"

[[providers]]
id = "github"
connector = { harn = "src/lib.harn" }
capabilities = ["webhook", "rate_limit", "pagination", "graphql", "oauth"]

[providers.setup]
auth_type = "github-app"
flow = "github-app"
required_secrets = ["github/app-private-key", "github/webhook-secret"]
setup_command = ["harn", "connect", "github"]
validation_command = ["harn", "connect", "status", "--connector", "github", "--json"]

[[providers.setup.health_checks]]
id = "app-private-key"
kind = "secret"
secret = "github/app-private-key"

[[providers.setup.health_checks]]
id = "webhook-secret"
kind = "secret"
secret = "github/webhook-secret"

[providers.setup.recovery]
missing_auth = "Store github/app-private-key and github/webhook-secret before enabling GitHub App bindings."
expired_credentials = "Rotate the GitHub App private key, update github/app-private-key, and rerun validation."
revoked_credentials = "Install or reauthorize the GitHub App, then replace github/app-private-key if needed."
missing_scopes = "Grant the GitHub App permissions required by the configured repository automation workflows."
inaccessible_resource = "Confirm the GitHub App installation can access the target owner and repository."
transient_provider_outage = "Retry after GitHub API and webhook delivery endpoints are healthy."

[connector_contract]
version = 1

[[connector_contract.fixtures]]
provider = "github"
name = "issues opened webhook"
kind = "webhook"
headers = { "X-GitHub-Event" = "issues", "X-GitHub-Delivery" = "delivery-contract-issues", "X-Hub-Signature-256" = "sha256=3911dfdeeb1a21a53e384641c841f225586a22f775b4f071d8c1953f5bb8ecae", "content-type" = "application/json" }
metadata = { secret_ids = { signing_secret = "github/signing_secret" } }
body = '''{"action":"opened","issue":{"number":7,"title":"Connector fixture issue","state":"open","html_url":"https://github.com/octo-org/octo-repo/issues/7","created_at":"2026-04-20T14:00:00Z","updated_at":"2026-04-20T14:00:00Z","user":{"id":1001,"login":"octocat","type":"User"}},"repository":{"name":"octo-repo","full_name":"octo-org/octo-repo","owner":{"id":2001,"login":"octo-org","type":"Organization"}},"sender":{"id":1001,"login":"octocat","type":"User"},"installation":{"id":3001}}'''
expect_type = "event"
expect_kind = "issues"
expect_signature_state = "verified"
expect_payload_contains = { provider = "github", event = "issues", action = "opened", installation_id = 3001, issue = { number = 7, title = "Connector fixture issue" } }
expect_event_count = 1

